<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Portal de Acesso</title>
  <style>
    /* --- VARIÁVEIS DE CORES (UX DESIGN) --- */
    :root {
      --bg-principal: #f4f6f9;
      --bg-card: #ffffff;
      --texto-p: #1e293b;
      --texto-s: #64748b;
      --borda: #cbd5e1;
      --foco: #3b82f6;
      --btn-bg: #1e3a8a;
      --btn-texto: #ffffff;
      --erro-bg: #fef2f2;
      --erro-texto: #991b1b;
      --header-bg: #0f172a;
      --header-texto: #ffffff;
    }

    [data-theme="dark"] {
      --bg-principal: #0f172a;
      --bg-card: #1e293b;
      --texto-p: #f8fafc;
      --texto-s: #94a3b8;
      --borda: #334155;
      --foco: #3b82f6;
      --btn-bg: #3b82f6;
      --btn-texto: #ffffff;
      --erro-bg: #451a03;
      --erro-texto: #f97316;
      --header-bg: #020617;
      --header-texto: #f8fafc;
    }

    /* --- ESTILOS BASE E RESPONSIVIDADE --- */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body {
      background-color: var(--bg-principal);
      color: var(--texto-p);
      transition: background 0.3s, color 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Botão Flutuante de Tema no Login */
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--borda);
      padding: 10px 15px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      color: var(--texto-p);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* Card de Login */
    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-seal { font-size: 40px; margin-bottom: 10px; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
    .login-subtitle { font-size: 14px; color: var(--texto-s); }

    .form-group { margin-bottom: 20px; }
    .field-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--texto-p); }
    .field-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--borda);
      background: var(--bg-principal);
      color: var(--texto-p);
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .field-input:focus { border-color: var(--foco); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--btn-bg);
      color: var(--btn-texto);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      display: none;
      background: var(--erro-bg);
      color: var(--erro-texto);
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    .login-footer { font-size: 12px; color: var(--texto-s); text-align: center; margin-top: 30px; line-height: 1.5; }

    /* --- INTERFACE DO PAINEL LOGADO --- */
    #wrapper-portal { display: none; width: 100%; min-height: 100vh; background: var(--bg-principal); position: absolute; top:0; left:0; }
    
    .navbar {
      background: var(--header-bg);
      color: var(--header-texto);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .nav-brand { font-weight: 700; font-size: 18px; }
    .nav-actions { display: flex; align-items: center; gap: 20px; }
    .user-email { font-size: 14px; opacity: 0.9; font-weight: 500; }
    
    .btn-logout {
      background: #dc2626;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-logout:hover { background: #b91c1c; }

    .nav-theme-btn {
      background: transparent;
      border: 1px solid var(--header-texto);
      color: var(--header-texto);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .main-content { padding: 40px; max-width: 1200px; margin: 0 auto; }
    .welcome-card { background: var(--bg-card); padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    
    /* Responsividade para telas menores (Smartphones) */
    @media(max-width: 600px) {
      .navbar { flex-direction: column; gap: 15px; text-align: center; padding: 15px; }
      .nav-actions { flex-direction: column; gap: 10px; width: 100%; }
      .user-email { order: 2; }
      .btn-logout { width: 100%; order: 3; }
      .main-content { padding: 20px; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="btn-tema-login" onclick="alternarTema()">🌙 Escuro</button>

  <div id="wrapper-login" class="login-container">
    <div class="login-header">
      <div class="login-seal">⚖</div>
      <h1 class="login-title">Acesso Restrito</h1>
      <p class="login-subtitle">Análise Processual · Espólio</p>
    </div>

    <div class="login-error" id="msg-erro"></div>

    <div class="form-group">
      <label class="field-label" for="email-input">E-mail autorizado</label>
      <input class="field-input" id="email-input" type="email" placeholder="seu@email.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label class="field-label" for="pass-input">Senha de acesso</label>
      <input class="field-input" id="pass-input" type="password" placeholder="••••••••" />
    </div>

    <button class="btn-login" id="btn-enviar" onclick="executarLogin()">Acessar Portal</button>

    <div class="login-footer">
      Acesso estrito a usuários autorizados.<br>
      Processo nº XXXXXXXX · Inventário
    </div>
  </div>

  <div id="wrapper-portal"></div>

  <script>
    // Gerenciador de inicialização do Tema Salvo
    window.addEventListener('DOMContentLoaded', () => {
      const temaSalvo = localStorage.getItem('portal-theme') || 'light';
      aplicarTema(temaSalvo);
    });

    function aplicarTema(tema) {
      const btnsTema = document.querySelectorAll('.nav-theme-btn, #btn-tema-login');
      if (tema === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        btnsTema.forEach(b => b.innerHTML = '☀️ Claro');
        localStorage.setItem('portal-theme', 'dark');
      } else {
        document.body.removeAttribute('data-theme');
        btnsTema.forEach(b => b.innerHTML = '🌙 Escuro');
        localStorage.setItem('portal-theme', 'light');
      }
    }

    function alternarTema() {
      const isDark = document.body.hasAttribute('data-theme');
      aplicarTema(isDark ? 'light' : 'dark');
    }

    // Processamento do Login no Servidor
    function executarLogin() {
      const email = document.getElementById('email-input').value;
      const senha = document.getElementById('pass-input').value;
      const erroDiv = document.getElementById('msg-erro');
      const btn = document.getElementById('btn-enviar');

      erroDiv.style.display = 'none';

      if (!email || !senha) {
        erroDiv.innerText = "Preencha todos os campos obrigatórios.";
        erroDiv.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerText = "Autenticando...";

      // Executa de forma assíncrona a função contida no arquivo Código.gs
      google.script.run
        .withSuccessHandler((resposta) => {
          btn.disabled = false;
          btn.innerText = "Acessar Portal";
          
          if (resposta.sucesso) {
            // Oculta a área de login, injeta a página segura e exibe
            document.getElementById('wrapper-login').style.display = 'none';
            document.getElementById('btn-tema-login').style.display = 'none';
            
            const portalContainer = document.getElementById('wrapper-portal');
            portalContainer.innerHTML = resposta.html;
            portalContainer.style.display = 'block';
            
            // Re-sincroniza o botão do tema recém-carregado
            aplicarTema(localStorage.getItem('portal-theme') || 'light');
          } else {
            erroDiv.innerText = resposta.mensagem;
            erroDiv.style.display = 'block';
          }
        })
        .withFailureHandler((err) => {
          btn.disabled = false;
          btn.innerText = "Acessar Portal";
          erroDiv.innerText = "Falha crítica de comunicação com o servidor.";
          erroDiv.style.display = 'block';
        })
        .autenticarUsuario(email, senha);
    }

    function efetuarLogout() {
      // Limpa dados e recarrega a página do Web App por segurança
      document.getElementById('wrapper-portal').style.display = 'none';
      document.getElementById('wrapper-portal').innerHTML = '';
      document.getElementById('email-input').value = '';
      document.getElementById('pass-input').value = '';
      document.getElementById('wrapper-login').style.display = 'block';
      document.getElementById('btn-tema-login').style.display = 'block';
    }
  </script>
</body>
</html>
