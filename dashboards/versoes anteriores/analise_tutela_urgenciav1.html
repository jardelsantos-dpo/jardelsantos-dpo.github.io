<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Seguro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 350px;">
  <h3 class="text-center mb-3">🔐 Login</h3>

  <input type="email" id="email" class="form-control mb-3" placeholder="Email">
  <input type="password" id="senha" class="form-control mb-3" placeholder="Senha">

  <button onclick="login()" class="btn btn-primary w-100">Entrar</button>

  <p id="msg" class="text-danger mt-2 text-center"></p>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  const res = await fetch("SUA_URL_SCRIPT", {
    method: "POST",
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("token", data.token);
    window.location.href = "dashboard.html";
  } else {
    document.getElementById('msg').innerText = "Credenciais inválidas";
  }
}
</script>

</body>
</html>
