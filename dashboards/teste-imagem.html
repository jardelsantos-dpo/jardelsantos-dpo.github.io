<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto sobre Badge</title>
    <style>
        /* Container principal que junta a imagem e o texto */
        .badge-container {
            position: relative;
            display: inline-block; /* Ajusta o tamanho do container ao tamanho do badge */
        }

        /* Estilização da imagem do badge */
        .badge-img {
            display: block;
            width: 150px; /* Altere o tamanho do seu badge aqui se necessário */
            height: auto;
        }

        /* Camada de texto que fica centralizada por cima da imagem */
        .badge-texto {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Centralização perfeita */
            
            /* Estilo do texto */
            color: white; /* Cor da letra */
            font-family: Arial, sans-serif;
            font-size: 14px; /* Tamanho da fonte */
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); /* Sombra para o texto não sumir no fundo */
            pointer-events: none; /* Impede que o texto atrapalhe cliques no badge */
            text-align: center;
            width: 80%; /* Garante que o texto quebre linha se for muito grande */
        }
    </style>
</head>
<body>

    <!-- Bloco do Badge -->
    <div class="badge-container">
        <!-- Substitua pelo link ou caminho da imagem do seu badge -->
        <img class="badge-img" src="badge-sgi-ti-exames.png" alt="Badge">
        
        <!-- O texto que vai aparecer escrito em cima -->
        <div class="badge-texto">NÍVEL 1</div>
    </div>

</body>
</html>
