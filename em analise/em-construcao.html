<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página em Construção | Jardel Santos</title>

    <meta name="description" content="Página em construção. Aguarde novidades em breve.">
    <meta name="author" content="Jardel Santos">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        /* Animação de pulsação */
        .pulse {
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Spinner loading */
        .loader {
            margin: 30px auto;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .construction-box {
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header></header>

<main>
    <!-- HERO -->
    <section class="services-hero" style="padding-bottom: 0px;">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 5%;">
        
            <span class="badge">🚧 Manutenção</span>

            <h1 class="pulse">Página em Construção</h1>
            <div class="underline"></div>

            <p style="color: var(--text-gray); margin-top: 15px;">
                Estou preparando algo incrível para você. Aguarde...
            </p>

            <div class="construction-box">
                <div class="loader"></div>

                <p style="color: var(--text-gray); font-size: 0.95rem; margin-bottom: 25px;">
                    Em breve novos conteúdos...
                </p>
            </div>
        </div>
    </section>


</main>

<footer class="site-footer"></footer>

<script src="assets/js/components.js"></script>
<script src="assets/js/script.js"></script>

</body>
</html>
