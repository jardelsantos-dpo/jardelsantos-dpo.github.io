<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Arquivos Seguros | Jardel Santos</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">

	<link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
	<link rel="shortcut icon" href="/img/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
</head>
<body>

<header></header>

<main class="dashboard-container" style="padding-top: 40px;">
    
    <section class="sidebar-arquivos">
        <div class="header-dashboard" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="margin: 0;">Arquivos Disponíveis</h3>
                <div class="underline"></div>
            </div>
            <button onclick="confirmarLogout()" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-gray); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; transition: border-color 0.2s, color 0.2s; white-space: nowrap;"
                    onmouseover="this.style.borderColor='#ef476f'; this.style.color='#ef476f';"
                    onmouseout="this.style.borderColor='var(--border-color)'; this.style.color='var(--text-gray)';">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </div>

        <div id="container-download-todos" style="display: none;">
            <button class="btn-batch" onclick="baixarTodosArquivos()">
                <i class="fa-solid fa-file-zipper"></i> Baixar Todos os Arquivos (.zip)
            </button>
        </div>

        <div id="lista-arquivos-loading" style="text-align:center; padding:20px;">
            <div class="loader-inline"></div>
            <p style="color: var(--text-gray); font-size: 0.85rem; margin-top:10px;">Carregando documentos autorizados...</p>
        </div>

        <div id="lista-arquivos" style="display: none;"></div>
    </section>

    <section class="area-visualizador" id="painel-visualizacao" oncontextmenu="return false;">
        <div class="header-dashboard">
            <h3 id="titulo-documento-atual">Visualizador de Segurança</h3>
            <div class="underline"></div>
        </div>

        <div id="visualizador-vazio">
            <i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: var(--border-color); margin-bottom: 15px;"></i>
            <p>Selecione um arquivo ao lado para iniciar a leitura protegida.</p>
        </div>

        <div id="container-render" style="display: none; height: 100%;">
            <iframe id="iframe-seguro" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
			
        </div>
    </section>
</main>

<footer class="site-footer"></footer>
<script src="assets/js/busca.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/script.js"></script>
<script src="assets/js/viewer.js" defer></script>

</body>
</html>
